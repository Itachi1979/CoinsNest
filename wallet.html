<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>
<link rel="stylesheet" href="wallet.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>My Wallet</h2>
    </div>

    <div class="balance">
        <p>Your Balance</p>
        <h1 id="coins">0 Coins</h1>
        <span id="rupees">≈ ₹0.00</span>
    </div>

    <p class="title">Select Payment Method</p>
    <div class="method"><input type="radio" name="pay"> Amazon Gift Card</div>
    <div class="method"><input type="radio" name="pay"> Google Play</div>
    <div class="method"><input type="radio" name="pay"> UPI / Paytm</div>

    <div class="form">
        <label>Enter Coins</label>
        <input type="number" id="coinInput" placeholder="Minimum 1200">

        <label>UPI / Email / ID</label>
        <input type="text" id="paymentDetails" placeholder="Enter details">
    </div>

    <button class="redeem" onclick="redeem()">Redeem Now</button>

    <div class="history">
        <h3>Withdrawal History</h3>
        <ul id="historyList"></ul>
    </div>
</div>

<div id="popup" class="popup">Withdrawal Request Submitted ✅</div>

<script src="firebase.js"></script>
<script src="wallet.js"></script>
</body>
</html>
