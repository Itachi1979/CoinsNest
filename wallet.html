<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>
<link rel="stylesheet" href="wallet.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>My Wallet</h2>
    </div>

    <!-- Balance -->
    <div class="balance">
        <p>Your Balance</p>
        <h1 id="coins">0</h1>
        <span id="rupees">≈ 0</span>
    </div>

    <!-- Payment -->
    <p class="title">Select Payment Method</p>

    <div class="method"><input type="radio" name="pay"> Amazon Gift Card</div>
    <div class="method"><input type="radio" name="pay"> Google Play</div>
    <div class="method"><input type="radio" name="pay"> UPI / Paytm</div>

    <!-- Form -->
    <div class="form">
        <label>Enter Coins</label>
        <input type="number" id="coinInput" placeholder="Minimum 1200">

        <label>UPI / Email / ID</label>
        <input type="text" id="paymentDetails" placeholder="Enter details">
    </div>

    <!-- Button -->
    <button class="redeem" onclick="redeem()">Redeem Now</button>

    <!-- History -->
    <div class="history">
        <h3>Withdrawal History</h3>
        <ul id="historyList"></ul>
    </div>

</div>

<!-- Popup -->
<div id="popup" class="popup">
    Withdrawal Request Submitted ✅
</div>
<script type="module" src="app.js"></script>


</body>
</html>
