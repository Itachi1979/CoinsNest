<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoinsNest - Wallet</title>
<link rel="stylesheet" href="style.css" />
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
<main class="page">
  <section class="card">
    <h2>Wallet</h2>
    <div class="stats">
      <div class="stat"><h4>Available Coins</h4><p id="coins">0</p></div>
      <div class="stat"><h4>INR Value</h4><p id="rupees">≈ ₹0.00</p></div>
    </div>

    <h3>Redeem Coins</h3>
    <label><input type="radio" name="pay" value="Amazon" /> Amazon Gift Card</label><br />
    <label><input type="radio" name="pay" value="Google Play" /> Google Play</label><br />
    <label><input type="radio" name="pay" value="UPI/Paytm" /> UPI / Paytm</label>
    <input class="input" type="number" id="coinInput" placeholder="Minimum 1200" style="margin-top:10px" />
    <input class="input" type="text" id="paymentDetails" placeholder="UPI / Email / ID" style="margin-top:10px" />
    <button style="margin-top:10px" onclick="redeem()">Redeem Now</button>

    <h3>Withdrawal History</h3>
    <ul id="historyList"></ul>
  </section>
</main>
<div id="popup" class="popup">Withdrawal Request Submitted ✅</div>
<nav class="bottom-nav">
  <a href="login.html">Home</a><a href="ticket.html">Ticket</a><a href="superoffer.html">Super</a><a class="active" href="wallet.html">Wallet</a><a href="invite.html">Invite</a><a href="profile.html">Profile</a>
</nav>
<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="wallet.js"></script>
</body>
</html>
