<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoinsNest Wallet</title>
  <link rel="stylesheet" href="wallet.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
  <div class="container">
    <h2>Wallet</h2>
    <p class="balance">💰 <span id="coins">0</span> Coins</p>
    <p class="hint">120 coins = ₹1 | Min withdrawal: 1200 coins</p>

    <input id="coinInput" type="number" placeholder="Coins to redeem" />
    <input id="paymentDetails" type="text" placeholder="UPI / Paytm / Gift email" />
    <button onclick="redeem()">Redeem Now</button>

    <h3>Recent Requests</h3>
    <ul id="historyList"></ul>

    <a href="index.html">← Back to Home</a>
  </div>

  <script src="firebase.js"></script>
  <script src="wallet.js"></script>
</body>
</html>
