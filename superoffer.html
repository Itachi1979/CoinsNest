<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoinsNest - Super Offer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <main class="page">
    <section class="card">
      <h2 id="offerTitle">Super Offer</h2>
      <p class="muted">Need 25 tickets. Choose the correct 4-digit number, watch ad, verification runs, then earn <b>175 coins</b>.</p>
      <div class="stat"><h4>Target Number</h4><p id="target"></p></div>
      <div class="options" id="options"></div>
      <p id="result" class="message"></p>
      <p id="adState" class="message"></p>
    </section>
  </main>
  <nav class="bottom-nav">
    <a href="login.html">Home</a><a href="ticket.html">Ticket</a><a class="active" href="superoffer.html">Super</a><a href="wallet.html">Wallet</a><a href="invite.html">Invite</a><a href="profile.html">Profile</a>
  </nav>
  <script src="firebase.js"></script>
  <script src="auth.js"></script>
  <script src="game.js"></script>
  <script>
    mountGame({
      titleId: 'offerTitle',
      optionsId: 'options',
      targetId: 'target',
      resultId: 'result',
      requireTickets: 25,
      rewardConfig: { rewardCoins: 175, ticketCost: 25 }
    });
  </script>
</body>
</html>
