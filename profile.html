<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoinsNest - Profile</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <main class="page">
    <section class="card">
      <h2>Profile</h2>
      <div class="stats">
        <div class="stat"><h4>Name</h4><p id="name">Player</p></div>
        <div class="stat"><h4>Email</h4><p id="email">-</p></div>
        <div class="stat"><h4>Coins</h4><p id="coins">0</p></div>
        <div class="stat"><h4>Tickets</h4><p id="tickets">0</p></div>
      </div>
      <button class="action-btn warn" onclick="logout()">Logout</button>
    </section>
  </main>
  <nav class="bottom-nav">
    <a href="login.html">Home</a><a href="ticket.html">Ticket</a><a href="superoffer.html">Super</a><a href="wallet.html">Wallet</a><a href="invite.html">Invite</a><a class="active" href="profile.html">Profile</a>
  </nav>

  <script src="firebase.js"></script>
  <script src="auth.js"></script>
  <script>
    auth.onAuthStateChanged(async (user) => {
      if (!user) return (window.location.href = 'index.html');
      await CoinsNest.ensureUserDoc(user);
      document.getElementById('name').textContent = user.displayName || 'Player';
      document.getElementById('email').textContent = user.email || '-';
      CoinsNest.watchUser(user.uid, (data) => {
        document.getElementById('coins').textContent = data?.coins || 0;
        document.getElementById('tickets').textContent = data?.tickets || 0;
      });
    });
  </script>
</body>
</html>
