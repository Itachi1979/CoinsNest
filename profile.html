<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="wallet.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
  <div class="container">
    <h2>Profile</h2>
    <p><strong>Name:</strong> <span id="name">-</span></p>
    <p><strong>Email:</strong> <span id="email">-</span></p>
    <p><strong>Coins:</strong> <span id="coins">0</span></p>
    <p><strong>Referrals:</strong> <span id="referrals">0</span></p>
    <button onclick="logout()">Logout</button>
    <a href="index.html">← Back to Home</a>
  </div>

  <script src="firebase.js"></script>
  <script>
    auth.onAuthStateChanged((user) => {
      if (!user) return (window.location.href = 'login.html');

      db.collection('users').doc(user.uid).onSnapshot((snap) => {
        if (!snap.exists) return;
        const data = snap.data();
        document.getElementById('name').innerText = data.name || 'Player';
        document.getElementById('email').innerText = data.email || '-';
        document.getElementById('coins').innerText = data.coins || 0;
        document.getElementById('referrals').innerText = data.referralsCount || 0;
      });
    });

    function logout() {
      auth.signOut().then(() => {
        window.location.href = 'login.html';
      });
    }
  </script>
</body>
</html>
